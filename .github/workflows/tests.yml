name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios:
    # macos-26 (preview) ships iOS 26.5 simulator runtimes; macos-15 caps at
    # iOS 26.2, where ~18 of our tests SIGABRT during process bootstrap.
    # Locally on iOS 26.5 (where developers run) those same tests pass cleanly,
    # so matching CI to the local runtime eliminates the cluster of
    # environmental crashes without skip-listing real test coverage.
    runs-on: macos-26
    timeout-minutes: 30
    steps:
      # The Packages/SwiftWhisper submodule is declared with an SSH URL in
      # .gitmodules. The fork is public, so rewrite to HTTPS for CI rather
      # than provisioning a deploy key.
      - name: Rewrite SSH submodule URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # The project targets iOS 26.2 / Xcode 26+. The runner image carries
      # several Xcode versions side-by-side; pick the newest stable so the
      # symbol SVG asset compiler matches the source format.
      - name: Show installed Xcode versions
        run: ls /Applications | grep -i '^Xcode' || true

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: List available iOS simulators
        run: xcrun simctl list devices available | grep -E 'iPhone (15|16|17)' | head -10

      # SwiftPM source checkouts dominate cold-build time (mlx-swift, swift-nio,
      # SwiftWhisper, etc. — several hundred MB pulled and compiled from scratch).
      # Caching build/SourcePackages keyed on Package.resolved skips the resolve
      # + checkout phase entirely on cache hits; the xcodebuild step still
      # compiles them fresh so this is the *safe* cache layer (no module-cache
      # corruption risk). Xcode version is in the key because checkout layout
      # can change across Xcode releases.
      - name: Cache SwiftPM checkouts
        uses: actions/cache@v4
        with:
          path: build/SourcePackages
          key: spm-${{ runner.os }}-xcode-latest-${{ hashFiles('**/Package.resolved') }}
          restore-keys: |
            spm-${{ runner.os }}-xcode-latest-

      # The dictionary sqlite is committed as a zstd archive (~63 MB) and
      # decompressed on demand; the raw file (~215 MB) is gitignored.
      - name: Decompress dictionary.sqlite
        run: bash scripts/ensure_dictionary.sh

      # The handwriting model is committed as a zstd archive (~14 MB) and
      # decompressed on demand; the raw file (~25 MB) is gitignored. Without
      # this the Copy Bundle Resources phase fails (CpResource handwriting-ja.model).
      - name: Decompress handwriting-ja.model
        run: bash scripts/ensure_handwriting_model.sh

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kioku.xcodeproj \
            -scheme Kioku \
            -destination 'platform=iOS Simulator,name=iPhone 17,OS=latest' \
            -enableCodeCoverage YES \
            -derivedDataPath build \
            -resultBundlePath build/Kioku.xcresult \
            CODE_SIGNING_ALLOWED=NO

      # Emit a per-target line-coverage summary into the workflow run page so
      # PR reviewers see coverage without downloading the artifact. xccov reads
      # the same xcresult the artifact step uploads — single source of truth.
      - name: Coverage summary
        if: always()
        run: |
          if [[ ! -d build/Kioku.xcresult ]]; then
            echo "No xcresult — skipping coverage summary." >> "$GITHUB_STEP_SUMMARY"
            exit 0
          fi
          {
            echo "## Coverage"
            echo
            echo "| Target | Lines covered | Executable lines | % |"
            echo "|---|---:|---:|---:|"
            xcrun xccov view --report --json build/Kioku.xcresult \
              | python3 -c '
          import json, sys
          report = json.load(sys.stdin)
          for target in report.get("targets", []):
              name = target.get("name", "?")
              covered = target.get("coveredLines", 0)
              executable = target.get("executableLines", 0)
              if executable == 0:
                  pct = "—"
              else:
                  pct = f"{(covered / executable * 100):.1f}%"
              print(f"| {name} | {covered} | {executable} | {pct} |")
          '
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kioku-xcresult
          path: build/Kioku.xcresult
          if-no-files-found: ignore
          retention-days: 7
