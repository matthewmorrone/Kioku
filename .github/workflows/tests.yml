name: Tests

on:
  push:
    branches: [ main ]
  pull_request:

jobs:
  ios:
    runs-on: macos-15
    timeout-minutes: 30
    steps:
      # The Packages/SwiftWhisper submodule is declared with an SSH URL in
      # .gitmodules. The fork is public, so rewrite to HTTPS for CI rather
      # than provisioning a deploy key.
      - name: Rewrite SSH submodule URLs to HTTPS
        run: git config --global url."https://github.com/".insteadOf "git@github.com:"

      - name: Checkout
        uses: actions/checkout@v5
        with:
          submodules: recursive

      # The project targets iOS 26.2 / Xcode 26+. macos-15's default Xcode is
      # 16.x — too old for symbol SVG template format 7.0 in Assets.xcassets.
      # Pick the newest Xcode the runner has installed.
      - name: Show installed Xcode versions
        run: ls /Applications | grep -i '^Xcode' || true

      - name: Select latest Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show toolchain
        run: |
          xcodebuild -version
          swift --version

      - name: List available iOS simulators
        run: xcrun simctl list devices available | grep -E 'iPhone (15|16|17)' | head -10

      # The dictionary sqlite is committed as a zstd archive (~63 MB) and
      # decompressed on demand; the raw file (~215 MB) is gitignored.
      - name: Decompress dictionary.sqlite
        run: bash scripts/ensure_dictionary.sh

      - name: Build & test
        run: |
          set -o pipefail
          xcodebuild test \
            -project Kioku.xcodeproj \
            -scheme Kioku \
            -destination 'platform=iOS Simulator,name=iPhone 16,OS=latest' \
            -enableCodeCoverage YES \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO

      - name: Upload xcresult bundle
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: kioku-xcresult
          path: build/Logs/Test/*.xcresult
          if-no-files-found: ignore
          retention-days: 7
